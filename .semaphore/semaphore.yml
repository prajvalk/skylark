version: v1.0
name: Skylark Pipeline
agent:
  machine:
    type: e1-standard-2
    os_image: ubuntu2404
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
blocks:
  - name: OpenBLAS 64 Build Test
    dependencies: []
    task:
      jobs:
        - name: Build
          commands:
            - checkout
            - cd openblas-64
            - bash build.sh
  - name: OpenMPI 5 Build Test
    dependencies: []
    task:
      jobs:
        - name: Build
          commands:
            - checkout
            - sudo apt-get install gfortran -y
            - cd openmpi5-64
            - bash build.sh
  - name: AMD BLIS Build Test
    dependencies: []
    task:
      jobs:
        - name: Build
          commands:
            - checkout
            - cd blis-64
            - bash build.sh
